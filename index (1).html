<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bird Fighter 2X Ver.3.0</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">
  <div id="top">🐦 BIRD FIGHTER 2X Ver.3.0 🐦</div>
  <canvas id="game" width="960" height="540"></canvas>
  <div id="hint">↖ / ↑ / ↗ は直接ジャンプ入力。ゲージMAXでガード＋必殺＝超必殺。</div>

  <div id="controls">
    <div class="pad">
      <button data-act="jumpBack" id="jumpBack">↖<br>後J</button>
      <button data-act="jumpUp" id="jumpUp">↑<br>J</button>
      <button data-act="jumpForward" id="jumpForward">↗<br>前J</button>
      <button data-act="left" id="left">←</button>
      <button data-act="guard" id="guard">盾<br>ガード</button>
      <button data-act="right" id="right">→</button>
    </div>
    <div class="actions">
      <button id="start">▶ START</button>
      <button data-act="throw" id="throwBtn">投げ</button>
      <button data-act="kick" id="kick">キック</button>
      <button data-act="special" id="special">必殺技</button>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
